name: Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

env:
  IMAGE_NAME: chrroessner/openldap

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=OpenLDAP Alpine
            org.opencontainers.image.description=OpenLDAP built from pinned source on Alpine Linux with env-driven bootstrap and optional persistent slapd.d support
            org.opencontainers.image.licenses=MIT AND OLDAP-2.8
            org.opencontainers.image.vendor=Rößner-Network-Solutions
            org.opencontainers.image.authors=Christian Rößner <christian@roessner.email>
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=https://hub.docker.com/r/chrroessner/openldap
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
            OCI_URL=https://hub.docker.com/r/chrroessner/openldap
            OCI_DOCUMENTATION=${{ github.server_url }}/${{ github.repository }}#readme
            OCI_VERSION=${{ steps.meta.outputs.version }}
            OCI_REVISION=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          attests: |
            type=provenance,mode=max
            type=sbom

      - name: Export SBOM files
        run: |
          set -eu
          mkdir -p dist/sbom
          image_ref="${IMAGE_NAME}@${{ steps.build.outputs.digest }}"
          docker buildx imagetools inspect "$image_ref" \
            --format '{{ json (index .SBOM "linux/amd64").SPDX }}' \
            > dist/sbom/openldap-linux-amd64.spdx.json
          docker buildx imagetools inspect "$image_ref" \
            --format '{{ json (index .SBOM "linux/arm64").SPDX }}' \
            > dist/sbom/openldap-linux-arm64.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openldap-sbom-${{ github.run_id }}
          path: dist/sbom/*.json
          if-no-files-found: error
